services:
  openclaw:
    build:
      context: .
      dockerfile: build/Dockerfile
    image: openclaw:local
    container_name: openclaw
    # Kein 'command' nötig – supervisord startet "openclaw gateway --bind lan"
    # automatisch (konfiguriert in build/supervisord.conf).
    environment:
      # Set to 0 to skip the auto-update on container start (e.g. offline/air-gapped)
      OPENCLAW_AUTO_UPDATE: ${OPENCLAW_AUTO_UPDATE:-1}
      # Gateway-Port (Standard: 18789) – kann hier oder per .env überschrieben werden
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      # Gateway-Token – wird von setup.sh in .env geschrieben und hier an den Container weitergegeben
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
    working_dir: /home/claw
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"   # Gateway im Heimnetz erreichbar
    volumes:
      - ./agent-data/.openclaw:/home/claw/.openclaw
      - ./agent-data/.npm-global:/home/claw/.npm-global   # npm global packages – persistiert auf dem Host
      - ./agent-data/.npm-cache:/home/claw/.npm            # npm download-cache – beschleunigt Updates
      - ./agent-data/.ssh:/home/claw/.ssh
      - ./:/workspace
      # Beispiel: Mount einer lokalen KeePass-Datei als Secret in den Container
      # - ./secrets/vault.kdbx:/run/secrets/vault.kdbx:ro
      # Beispiel: Mount eines API-Key-Files
      # - ./secrets/my_api_key.txt:/run/secrets/my_api_key.txt:ro

networks:
  agent-net:
    name: agent-net
    driver: bridge
